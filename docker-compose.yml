services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-docflow}
      POSTGRES_USER: ${POSTGRES_USER:-docflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docflow}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docflow} -d ${POSTGRES_DB:-docflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://docflow:docflow@postgres:5432/docflow}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LOCAL_STORAGE_ROOT: /app/storage
      OCR_PROVIDER: ${OCR_PROVIDER:-mock}
      DEEPSEEK_OCR2_ENDPOINT: ${DEEPSEEK_OCR2_ENDPOINT:-}
      DEEPSEEK_OCR2_API_KEY: ${DEEPSEEK_OCR2_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://docflow:docflow@postgres:5432/docflow}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LOCAL_STORAGE_ROOT: /app/storage
      OCR_PROVIDER: ${OCR_PROVIDER:-mock}
      DEEPSEEK_OCR2_ENDPOINT: ${DEEPSEEK_OCR2_ENDPOINT:-}
      DEEPSEEK_OCR2_API_KEY: ${DEEPSEEK_OCR2_API_KEY:-}
    volumes:
      - ./storage:/app/storage
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres-data:
